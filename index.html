<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-10 학습 나눔</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="white" opacity="0.3"/><circle cx="12" cy="12" r="3" fill="white"/></svg>'), auto;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.95);
            border-radius: 50%;
            z-index: 1000;
            pointer-events: none;
            box-shadow: 0 0 12px rgba(255,255,255,0.35);
        }

        #crosshair::before,
        #crosshair::after {
            content: "";
            position: absolute;
            background: rgba(255,255,255,0.85);
        }

        #crosshair::before {
            width: 22px;
            height: 2px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        #crosshair::after {
            width: 2px;
            height: 22px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8em;
            font-weight: 900;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #ffe66d, #a8e6cf);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            margin-bottom: 26px;
            letter-spacing: -2px;
            text-align: center;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .loading-bar {
            width: 320px;
            height: 4px;
            background: rgba(255,255,255,0.12);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 18px;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            width: 100%;
        }

        .loading-text {
            margin-top: 16px;
            color: rgba(255,255,255,0.66);
            font-size: 0.92em;
            letter-spacing: 2px;
        }

        #entrance-guide {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
            opacity: 1;
            transition: opacity 0.9s ease;
            pointer-events: none;
        }

        #entrance-guide.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #entrance-guide h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3em;
            margin-bottom: 20px;
            animation: fadeInUp 1s ease;
        }

        #entrance-guide p {
            font-size: 1.15em;
            opacity: 0.86;
            animation: fadeInUp 1s ease 0.25s both;
        }

        #entrance-guide .start-button {
            margin-top: 34px;
            padding: 15px 42px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1.06em;
            font-weight: 700;
            cursor: pointer;
            pointer-events: auto;
            animation: fadeInUp 1s ease 0.5s both;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        #entrance-guide .start-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.35);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(28px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cursor-glow {
            position: fixed;
            width: 340px;
            height: 340px;
            background: radial-gradient(circle, rgba(78, 205, 196, 0.20) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: opacity 0.25s ease;
        }

        #ui-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 34px 48px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            font-weight: 900;
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.35);
        }

        .exhibition-info {
            text-align: right;
            opacity: 0.88;
        }

        .exhibition-info .date {
            font-size: 0.85em;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #4ecdc4;
        }

        .exhibition-info .location {
            font-size: 0.92em;
            margin-top: 5px;
            font-weight: 300;
        }

        .controls {
            position: absolute;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(12px);
            padding: 18px 28px;
            border-radius: 42px;
            border: 1px solid rgba(255,255,255,0.12);
            pointer-events: auto;
            display: flex;
            gap: 24px;
            align-items: center;
            max-width: calc(100vw - 40px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 0.84em;
            color: rgba(255,255,255,0.94);
        }

        .control-key {
            background: rgba(255,255,255,0.10);
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.92em;
            border: 1px solid rgba(255,255,255,0.22);
            min-width: 42px;
            text-align: center;
        }

        #artwork-info {
            position: absolute;
            top: 50%;
            right: 34px;
            transform: translateY(-50%);
            width: 340px;
            background: rgba(0,0,0,0.84);
            backdrop-filter: blur(16px);
            padding: 34px;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.10);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.32s ease, transform 0.32s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }

        #artwork-info.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(-50%) translateX(0);
        }

        #artwork-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        #artwork-info .date {
            color: #4ecdc4;
            font-size: 0.92em;
            letter-spacing: 2px;
            margin-bottom: 18px;
            display: block;
        }

        #artwork-info .description {
            line-height: 1.8;
            opacity: 0.92;
            font-weight: 300;
            word-break: keep-all;
        }

        #artwork-info .category {
            display: inline-block;
            margin-top: 18px;
            padding: 8px 16px;
            background: rgba(78, 205, 196, 0.18);
            color: #4ecdc4;
            border-radius: 20px;
            font-size: 0.82em;
            letter-spacing: 1px;
        }

        .close-info {
            position: absolute;
            top: 16px;
            right: 18px;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.55em;
            cursor: pointer;
            opacity: 0.66;
            transition: opacity 0.2s ease;
            pointer-events: auto;
        }

        .close-info:hover {
            opacity: 1;
        }

        .nav-dots {
            position: absolute;
            left: 34px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 14px;
            pointer-events: auto;
        }

        .nav-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.28);
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .nav-dot:hover {
            background: rgba(255,255,255,0.62);
            transform: scale(1.25);
        }

        .nav-dot.active {
            background: #4ecdc4;
            box-shadow: 0 0 18px #4ecdc4;
        }

        .nav-dot::after {
            content: attr(data-title);
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            white-space: nowrap;
            background: rgba(0,0,0,0.92);
            padding: 5px 14px;
            border-radius: 8px;
            font-size: 0.8em;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .nav-dot:hover::after {
            opacity: 1;
        }

        #image-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 20000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        #image-modal.hidden {
            display: none;
        }

        .image-modal-inner {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }

        #image-modal-img {
            max-width: 96vw;
            max-height: 92vh;
            width: auto;
            height: auto;
            object-fit: contain;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.55);
            image-rendering: auto;
        }

        .image-modal-toolbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(20,20,20,0.82);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            padding: 10px 14px;
            z-index: 20010;
        }

        .image-modal-btn {
            border: none;
            background: rgba(255,255,255,0.08);
            color: #fff;
            border-radius: 999px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.95em;
        }

        .image-modal-btn:hover {
            background: rgba(255,255,255,0.16);
        }

        .image-modal-title {
            color: rgba(255,255,255,0.92);
            font-size: 0.92em;
            margin: 0 4px;
        }

        .hint-toast {
            position: fixed;
            top: 78px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.72);
            color: rgba(255,255,255,0.86);
            padding: 10px 16px;
            border-radius: 999px;
            z-index: 1200;
            font-size: 0.88em;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.10);
        }

        .hint-toast.hidden {
            display: none;
        }

        @media (max-width: 900px) {
            header {
                padding: 20px 20px;
            }

            .logo {
                font-size: 1.25em;
                max-width: 58vw;
                line-height: 1.25;
            }

            #artwork-info {
                right: 16px;
                left: 16px;
                width: auto;
                top: auto;
                bottom: 110px;
                transform: none;
            }

            #artwork-info.visible {
                transform: none;
            }

            .nav-dots {
                left: 16px;
            }

            .controls {
                bottom: 14px;
                gap: 12px;
                padding: 14px 18px;
            }

            #entrance-guide h2 {
                font-size: 2.2em;
            }

            #loading h1 {
                font-size: 2.3em;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>

    <div id="loading">
        <h1>3-10 학습 나눔 게시판</h1>
        <div class="loading-bar"><div class="loading-progress"></div></div>
        <div class="loading-text">게시판을 준비하고 있습니다...</div>
    </div>

    <div id="entrance-guide">
        <h2>3-10 학습 나눔</h2>
        <p>메타버스 기반 학급 학습 공유 플랫폼 스터디갤러리</p>
        <button class="start-button" onclick="startExhibition()">게시판 입장하기</button>
    </div>

    <div id="canvas-container"></div>
    <div class="cursor-glow"></div>

    <div id="ui-overlay">
        <header>
            <div class="logo">3-10 Metaverse Classroom Learning Hub — Study Gallery</div>
            <div class="exhibition-info">
                <div class="date">2026</div>
                <div class="location">학급 내 자기주도학습 문화 확산 활동</div>
            </div>
        </header>

        <div id="artwork-info">
            <button class="close-info" onclick="closeArtworkInfo()">×</button>
            <h2 id="artwork-title">작품 제목</h2>
            <span class="date" id="artwork-date">학번</span>
            <p class="description" id="artwork-description">작품 설명이 여기에 표시됩니다.</p>
            <span class="category" id="artwork-category">카테고리</span>
        </div>

        <div class="nav-dots" id="nav-dots-container"></div>

        <div class="controls">
            <div class="control-item"><span class="control-key">W A S D</span><span>이동</span></div>
            <div class="control-item"><span class="control-key">Q / E</span><span>이전/다음</span></div>
            <div class="control-item"><span class="control-key">F</span><span>선택/확대</span></div>
            <div class="control-item"><span class="control-key">Enter</span><span>원본 보기</span></div>
            <div class="control-item"><span class="control-key">ESC</span><span>닫기/커서 해제</span></div>
        </div>
    </div>

    <div id="hint-toast" class="hint-toast hidden">선택한 작품을 크게 보려면 Enter 또는 F를 누르기</div>

    <div id="image-modal" class="hidden" onclick="closeImageModal()">
        <div class="image-modal-toolbar">
            <button class="image-modal-btn" onclick="zoomModalImage(0.9); event.stopPropagation();">축소</button>
            <button class="image-modal-btn" onclick="zoomModalImage(1.1); event.stopPropagation();">확대</button>
            <button class="image-modal-btn" onclick="resetModalZoom(); event.stopPropagation();">원래 크기</button>
            <div class="image-modal-title" id="image-modal-title">원본 이미지</div>
            <button class="image-modal-btn" onclick="closeImageModal(); event.stopPropagation();">닫기</button>
        </div>
        <div class="image-modal-inner" onclick="event.stopPropagation();">
            <img id="image-modal-img" src="" alt="확대 이미지">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const artworks = [
            { title: "이유준", date: "31028", description: "영어 3~7 & 11 단어 정리", category: "영어", image: "img1.jpeg" },
            { title: "이유준", date: "31028", description: "영어 3~7 & 11 주제 정리", category: "영어", image: "img2.jpeg" },
            { title: "이현성", date: "31030", description: "3월 모고 미적분 29번 & 30번 문제풀이", category: "수학", image: "img3.jpeg" },
            { title: "이현성", date: "31030", description: "3월 모고 21번 & 22번 문제풀이", category: "수학", image: "img4.jpeg" },
            { title: "박수혁", date: "31016", description: "수행여행", category: "생명", image: "img5.jpeg" },
            { title: "박수혁", date: "31016", description: "반", category: "생명", image: "img6.jpeg" },
            { title: "박수혁", date: "31016", description: "학기", category: "생명", image: "img7.jpeg" },
            { title: "한주원", date: "31034", description: "사회문화 1단원 수능실전 문제 간략풀이", category: "사회문화", image: "img8.jpeg" },
            { title: "김태은", date: "31010", description: "미적분 수열의 극한 핵심 정리", category: "수학", image: "img9.jpeg" },
            { title: "김지우", date: "31009", description: "지구과학 지권의 변동 문제풀이", category: "지구과학", image: "img10.jpeg" },
            { title: "김정우", date: "31008", description: "국어 비문학: 완전 동형 암호 & 문학: 찬기 파랑가 해설", category: "국어", image: "img11.jpeg" },
            { title: "김정우", date: "31008", description: "국어 비문학: 범죄행위와 정당성 & 임대차 계약, 문학: 어이못오던가 해설", category: "국어", image: "img12.jpeg" },
            { title: "김정우", date: "31008", description: "국어 문학: 장마, 전라도 가시내, 나옥, 흙 해설", category: "국어", image: "img13.jpeg" },
            { title: "임혜린", date: "31031", description: "미적분 함수의 그래프 문제풀이", category: "수학", image: "img14.jpeg" },
            { title: "신소율", date: "31021", description: "문학 작품의 외재적 맥락 필기", category: "국어", image: "img15.jpeg" }
        ];

        let scene, camera, renderer;
        let artworkFrames = [];
        let isExhibitionStarted = false;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let isPointerLocked = false;
        let currentArtworkIndex = 0;
        let modalScale = 1;

        const cameraSpeed = 0.1;
        const lookSpeed = 0.002;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a0a, 1, 50);
            scene.background = new THREE.Color(0x0a0a0a);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            createLights();
            createGallerySpace();
            createArtworks();
            createNavDots();
            setupEventListeners();
            animate();

            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1200);
        }

        function createLights() {
            scene.add(new THREE.AmbientLight(0xffffff, 0.72));

            artworks.forEach((_, index) => {
                const angle = (index / artworks.length) * Math.PI * 2;
                const radius = 9.2;

                const spotLight = new THREE.SpotLight(0xffffff, 0.95);
                spotLight.position.set(Math.cos(angle) * radius * 0.78, 4.3, Math.sin(angle) * radius * 0.78);
                spotLight.target.position.set(Math.cos(angle) * 12.8, 1.8, Math.sin(angle) * 12.8);
                spotLight.angle = Math.PI / 6;
                spotLight.penumbra = 0.32;
                spotLight.decay = 1.4;
                spotLight.distance = 18;

                scene.add(spotLight);
                scene.add(spotLight.target);
            });
        }

        function createGallerySpace() {
            const floor = new THREE.Mesh(
                new THREE.CircleGeometry(15, 64),
                new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.85 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            const walls = new THREE.Mesh(
                new THREE.CylinderGeometry(13, 13, 7, 64, 1, true),
                new THREE.MeshStandardMaterial({ color: 0x101010, side: THREE.BackSide })
            );
            walls.position.y = 3;
            scene.add(walls);
        }

        function createArtworks() {
            const loader = new THREE.TextureLoader();

            artworks.forEach((artwork, index) => {
                const angle = (index / artworks.length) * Math.PI * 2;
                const radius = 12.78;
                const group = new THREE.Group();

                loader.load(
                    artwork.image,
                    (texture) => {
                        if ('colorSpace' in texture) {
                            texture.colorSpace = THREE.SRGBColorSpace;
                        } else {
                            texture.encoding = THREE.sRGBEncoding;
                        }

                        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
                        texture.minFilter = THREE.LinearFilter;
                        texture.magFilter = THREE.LinearFilter;
                        texture.generateMipmaps = false;
                        texture.needsUpdate = true;

                        const img = texture.image;
                        const aspect = img.width / img.height;

                        const maxHeight = 4.2;
                        const maxWidth = 5.2;

                        let imageWidth, imageHeight;

                        if (aspect >= 1) {
                            imageWidth = Math.min(maxWidth, maxHeight * aspect);
                            imageHeight = imageWidth / aspect;
                        } else {
                            imageHeight = maxHeight;
                            imageWidth = imageHeight * aspect;
                        }

                        const frameMargin = 0.16;

                        const frame = new THREE.Mesh(
                            new THREE.BoxGeometry(imageWidth + frameMargin * 2, imageHeight + frameMargin * 2, 0.12),
                            new THREE.MeshStandardMaterial({
                                color: 0xd4af37,
                                roughness: 0.25,
                                metalness: 0.82
                            })
                        );

                        const image = new THREE.Mesh(
                            new THREE.PlaneGeometry(imageWidth, imageHeight),
                            new THREE.MeshBasicMaterial({ map: texture })
                        );
                        image.position.z = 0.071;

                        group.add(frame);
                        group.add(image);

                        group.position.set(Math.cos(angle) * radius, 1.8, Math.sin(angle) * radius);
                        group.lookAt(0, 1.8, 0);
                        group.userData = { index, artwork, imageWidth, imageHeight };

                        createArtworkLabel(artwork, group, imageHeight);

                        artworkFrames.push(group);
                        scene.add(group);
                    },
                    undefined,
                    () => {
                        console.log(`이미지 로드 실패: ${artwork.image}`);
                    }
                );
            });
        }

        function createArtworkLabel(artwork, group, imageHeight) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 128;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.84)';
            ctx.fillRect(0, 0, 512, 128);

            ctx.fillStyle = '#4ecdc4';
            ctx.font = 'bold 32px "Noto Sans KR"';
            ctx.textAlign = 'center';
            ctx.fillText(artwork.title, 256, 50);

            ctx.fillStyle = '#ffffff';
            ctx.font = '24px "Noto Sans KR"';
            ctx.fillText(artwork.date, 256, 90);

            const label = new THREE.Mesh(
                new THREE.PlaneGeometry(1.8, 0.45),
                new THREE.MeshBasicMaterial({
                    map: new THREE.CanvasTexture(canvas),
                    transparent: true
                })
            );

            label.position.set(0, -(imageHeight / 2) - 0.42, 0.11);
            group.add(label);
        }

        function createNavDots() {
            const container = document.getElementById('nav-dots-container');

            artworks.forEach((artwork, i) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot';
                dot.setAttribute('data-title', artwork.title);
                dot.onclick = () => navigateToArtwork(i, true);
                container.appendChild(dot);
            });
        }

        function setupEventListeners() {
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Escape') {
                    if (!document.getElementById('image-modal').classList.contains('hidden')) {
                        closeImageModal();
                        return;
                    }
                }

                if (e.code === 'KeyW') moveForward = true;
                if (e.code === 'KeyS') moveBackward = true;
                if (e.code === 'KeyA') moveLeft = true;
                if (e.code === 'KeyD') moveRight = true;

                if (isExhibitionStarted) {
                    if (e.code === 'KeyE') {
                        currentArtworkIndex = (currentArtworkIndex + 1) % artworks.length;
                        navigateToArtwork(currentArtworkIndex, false);
                    }

                    if (e.code === 'KeyQ') {
                        currentArtworkIndex = (currentArtworkIndex - 1 + artworks.length) % artworks.length;
                        navigateToArtwork(currentArtworkIndex, false);
                    }

                    if (e.code === 'KeyF') {
                        selectArtworkAtCenter(true);
                    }

                    if (e.code === 'Enter') {
                        openCurrentArtworkModal();
                    }
                }
            });

            document.addEventListener('keyup', (e) => {
                if (e.code === 'KeyW') moveForward = false;
                if (e.code === 'KeyS') moveBackward = false;
                if (e.code === 'KeyA') moveLeft = false;
                if (e.code === 'KeyD') moveRight = false;
            });

            document.addEventListener('mousemove', (e) => {
                const glow = document.querySelector('.cursor-glow');

                if (isPointerLocked) {
                    camera.rotation.y -= e.movementX * lookSpeed;
                    camera.rotation.x = Math.max(
                        -Math.PI / 3,
                        Math.min(Math.PI / 3, camera.rotation.x - e.movementY * lookSpeed)
                    );
                    glow.style.left = '50%';
                    glow.style.top = '50%';
                } else {
                    glow.style.left = e.clientX + 'px';
                    glow.style.top = e.clientY + 'px';
                }
            });

            renderer.domElement.addEventListener('click', () => {
                if (!isExhibitionStarted) return;

                if (!isPointerLocked) {
                    renderer.domElement.requestPointerLock();
                    return;
                }

                selectArtworkAtCenter(false);
            });

            document.addEventListener('pointerlockchange', () => {
                isPointerLocked = document.pointerLockElement === renderer.domElement;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            document.getElementById('image-modal-img').addEventListener('wheel', (e) => {
                e.preventDefault();
                const factor = e.deltaY < 0 ? 1.08 : 0.92;
                zoomModalImage(factor);
            }, { passive: false });
        }

        function selectArtworkAtCenter(openModalAfterSelect = false) {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0, 0), camera);

            const hits = ray.intersectObjects(artworkFrames, true);

            if (hits.length > 0) {
                let obj = hits[0].object;

                while (obj.parent && !obj.userData.artwork) {
                    obj = obj.parent;
                }

                if (obj.userData.artwork) {
                    currentArtworkIndex = obj.userData.index;
                    navigateToArtwork(currentArtworkIndex, openModalAfterSelect);
                }
            }
        }

        function updateCamera() {
            if (!isExhibitionStarted) return;
            if (!document.getElementById('image-modal').classList.contains('hidden')) return;

            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            dir.y = 0;
            dir.normalize();

            const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

            if (moveForward) camera.position.add(dir.clone().multiplyScalar(cameraSpeed));
            if (moveBackward) camera.position.add(dir.clone().multiplyScalar(-cameraSpeed));
            if (moveLeft) camera.position.add(side.clone().multiplyScalar(cameraSpeed));
            if (moveRight) camera.position.add(side.clone().multiplyScalar(-cameraSpeed));

            const currentHeight = 1.6;
            const d = Math.sqrt(camera.position.x ** 2 + camera.position.z ** 2);

            if (d > 11) {
                const ratio = 11 / d;
                camera.position.x *= ratio;
                camera.position.z *= ratio;
            }

            camera.position.y = currentHeight;
            updateNavigationDots();
        }

        function navigateToArtwork(index, openModal = false) {
            currentArtworkIndex = index;

            const targetFrame = artworkFrames.find(f => f.userData && f.userData.index === index);
            if (!targetFrame) return;

            const angle = (index / artworks.length) * Math.PI * 2;
            const targetWidth = targetFrame.userData.imageWidth || 3.5;
            const targetHeight = targetFrame.userData.imageHeight || 4.2;

            const dynamicDistance = Math.max(5.6, Math.min(7.2, 4.9 + Math.max(targetWidth, targetHeight) * 0.45));

            const newPos = new THREE.Vector3(
                Math.cos(angle) * dynamicDistance,
                1.6,
                Math.sin(angle) * dynamicDistance
            );

            camera.position.copy(newPos);
            camera.lookAt(targetFrame.position.x, 1.8, targetFrame.position.z);

            showArtworkInfo(artworks[index]);
            flashHint();

            if (openModal) {
                setTimeout(() => {
                    openImageModal(artworks[index]);
                }, 180);
            }
        }

        function showArtworkInfo(artwork) {
            document.getElementById('artwork-title').textContent = artwork.title;
            document.getElementById('artwork-date').textContent = artwork.date;
            document.getElementById('artwork-description').textContent = artwork.description;
            document.getElementById('artwork-category').textContent = artwork.category;
            document.getElementById('artwork-info').classList.add('visible');
        }

        function closeArtworkInfo() {
            document.getElementById('artwork-info').classList.remove('visible');
        }

        function updateNavigationDots() {
            const dots = document.querySelectorAll('.nav-dot');
            let near = 0;
            let min = Infinity;

            artworkFrames.forEach((f, i) => {
                const d = camera.position.distanceTo(f.position);
                if (d < min) {
                    min = d;
                    near = i;
                }
            });

            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === near);
            });
        }

        function startExhibition() {
            isExhibitionStarted = true;
            document.getElementById('entrance-guide').classList.add('hidden');
            renderer.domElement.requestPointerLock();
            setTimeout(() => navigateToArtwork(0, false), 120);
        }

        function openCurrentArtworkModal() {
            const artwork = artworks[currentArtworkIndex];
            if (!artwork) return;
            openImageModal(artwork);
        }

        function openImageModal(artwork) {
            const modal = document.getElementById('image-modal');
            const img = document.getElementById('image-modal-img');
            const title = document.getElementById('image-modal-title');

            modalScale = 1;
            img.style.transform = `scale(${modalScale})`;
            img.src = artwork.image;
            title.textContent = `${artwork.title} · ${artwork.category} · 원본 이미지`;
            modal.classList.remove('hidden');

            if (document.pointerLockElement) {
                document.exitPointerLock();
            }
        }

        function closeImageModal() {
            document.getElementById('image-modal').classList.add('hidden');
            resetModalZoom();
        }

        function zoomModalImage(multiplier) {
            modalScale = Math.max(0.6, Math.min(4, modalScale * multiplier));
            document.getElementById('image-modal-img').style.transform = `scale(${modalScale})`;
        }

        function resetModalZoom() {
            modalScale = 1;
            document.getElementById('image-modal-img').style.transform = `scale(${modalScale})`;
        }

        function flashHint() {
            const toast = document.getElementById('hint-toast');
            toast.classList.remove('hidden');
            clearTimeout(flashHint._timer);
            flashHint._timer = setTimeout(() => {
                toast.classList.add('hidden');
            }, 1800);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateCamera();
            renderer.render(scene, camera);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
